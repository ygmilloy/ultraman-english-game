<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>English Learning App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding-top: 60px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            color: #555;
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .menu-btn {
            width: 320px;
            max-width: calc(100vw - 40px);
            font-size: 28px;
            padding: 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .game-btn {
            background: #4CAF50;
        }

        .flashcard-btn {
            background: #2196F3;
        }
    </style>
</head>

<body>

    <h1>🎮 English Learning App</h1>
    <p>Choose a mode</p>

    <div class="menu">
        <button class="menu-btn game-btn" onclick="location.href='ultraman_game.html'">
            🦸 Ultraman English Game
        </button>

        <button class="menu-btn flashcard-btn" onclick="location.href='vocab_flashcards.html'">
            📚 Word Flashcards
        </button>
    </div>

</body>

</html>
