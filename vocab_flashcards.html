<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Flashcards</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px 16px 40px;
  }

  h1 {
    font-size: 36px;
    margin: 10px 0 16px;
  }

  .grade-btn {
    font-size: 22px;
    padding: 12px 18px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    color: white;
    cursor: pointer;
  }

  .k { background:#e91e63; }
  .g1 { background:#2196f3; }
  .g2 { background:#ff5722; }

  #mode, #direction, #stats, #message {
    margin: 10px 0;
    font-size: 20px;
  }

  #mode {
    font-weight: bold;
  }

  #card {
    background: white;
    width: 360px;
    max-width: calc(100vw - 40px);
    margin: 20px auto;
    padding: 40px 24px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #word {
    font-size: 38px;
    line-height: 1.4;
    word-break: break-word;
  }

  button.action {
    font-size: 20px;
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .correct { background:#4CAF50; color:white; }
  .wrong { background:#f44336; color:white; }
  .speak { background:#ff9800; color:white; }
  .review { background:#9c27b0; color:white; }
  .small { background:#607d8b; color:white; }

  .hint {
    color: #666;
    font-size: 15px;
    margin-top: 8px;
  }
</style>
</head>

<body>

<h1>📚 Word Flashcards</h1>

<div>
  <button class="grade-btn k" onclick="setGrade('k')">🧸 幼兒園</button>
  <button class="grade-btn g1" onclick="setGrade('g1')">🚗 一年級</button>
  <button class="grade-btn g2" onclick="setGrade('g2')">🦸 二年級</button>
</div>

<div id="mode">今日模式：一般練習</div>
<div id="direction">題目方向：</div>

<div id="card" onclick="flip()">
  <div id="word">準備開始</div>
</div>

<div>
  <button class="action speak" onclick="speakCurrent()">🔊 發音</button>
  <button class="action correct" onclick="mark(true)">✅ 會</button>
  <button class="action wrong" onclick="mark(false)">❌ 不會</button>
</div>

<div>
  <button class="action review" onclick="startTodayWrongReview()">今日錯字複習</button>
  <button class="action small" onclick="start()">重新開始</button>
</div>

<div id="stats"></div>
<div id="message"></div>
<div class="hint">點卡片可翻面；今天做錯的字，可按「今日錯字複習」再練一次。</div>

let grade = "k";
let words = [];
let index = 0;
let showAnswer = false;
let correctCount = 0;
let totalCount = 0;
let currentMode = "normal"; // normal | weekly | todayWrong
let todayWrongWords = [];

function todayString(date = new Date()) {
  return date.toISOString().slice(0, 10);
}

function dateDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return todayString(d);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function dedupeWords(arr) {
  const map = new Map();
  arr.forEach(w => map.set(w.en + "__" + w.zh, w));
  return Array.from(map.values());
}

function wrongStorageKey(dateStr) {
  return "wrong_" + dateStr;
}

function getLastTwoDaysWrongWords() {
  const dates = [dateDaysAgo(1), dateDaysAgo(2)];
  let arr = [];
  dates.forEach(d => {
    const list = JSON.parse(localStorage.getItem(wrongStorageKey(d)) || "[]");
    arr = arr.concat(list);
  });
  return dedupeWords(arr);
}

function getWeeklyWrongWords() {
  let arr = [];
  for (let i = 0; i < 7; i++) {
    const d = dateDaysAgo(i);
    const list = JSON.parse(localStorage.getItem(wrongStorageKey(d)) || "[]");
    arr = arr.concat(list);
  }
  return dedupeWords(arr);
}

function isWeeklyReviewDay() {
  return new Date().getDay() === WEEKLY_DAY;
}

function setGrade(g) {
  grade = g;
  start();
}

function makeQuestionList(sourceWords) {
  const cloned = [...sourceWords];
  shuffle(cloned); // 先把字庫打亂

  const questionList = cloned.map(w => {
    const askZh = Math.random() < 0.5;
    return {
      zh: w.zh,
      en: w.en,
      direction: askZh ? "zhToEn" : "enToZh"
    };
  });

  shuffle(questionList); // 再把題目順序打亂
  return questionList.slice(0, DAILY_LIMIT);
}

function start() {
  currentMode = isWeeklyReviewDay() ? "weekly" : "normal";
  todayWrongWords = [];

  const base = [...data[grade]];
  let extra = [];

  if (currentMode === "weekly") {
    extra = getWeeklyWrongWords();
    document.getElementById("mode").innerText = "📅 今日模式：每週綜合複習";
  } else {
    extra = getLastTwoDaysWrongWords();
    document.getElementById("mode").innerText = "📘 今日模式：一般練習（含前兩天錯字）";
  }

  const pool = dedupeWords(base.concat(extra));
  shuffle(pool); // 整個題庫先亂數
  words = makeQuestionList(pool);

  index = 0;
  showAnswer = false;
  correctCount = 0;
  totalCount = 0;
  document.getElementById("message").innerText = "";

  next();
}

function startTodayWrongReview() {
  if (todayWrongWords.length === 0) {
    document.getElementById("message").innerText = "今天還沒有錯字";
    return;
  }

  currentMode = "todayWrong";
  document.getElementById("mode").innerText = "🔁 今日模式：當日錯字複習";

  const reviewPool = dedupeWords(todayWrongWords);
  shuffle(reviewPool);
  words = makeQuestionList(reviewPool);

  index = 0;
  showAnswer = false;
  correctCount = 0;
  totalCount = 0;
  document.getElementById("message").innerText = "";

  next();
}

function getPromptText(item) {
  if (item.direction === "zhToEn") {
    document.getElementById("direction").innerText = "題目方向：中文 → 英文";
    return item.zh;
  } else {
    document.getElementById("direction").innerText = "題目方向：英文 → 中文";
    return item.en;
  }
}

function getAnswerText(item) {
  return item.direction === "zhToEn" ? item.en : item.zh;
}

function next() {
  if (index >= words.length) {
    document.getElementById("word").innerText = "🎉 完成";
    if (todayWrongWords.length > 0 && currentMode !== "todayWrong") {
      document.getElementById("message").innerText = "可以按『今日錯字複習』再練一次";
    } else {
      document.getElementById("message").innerText = "今天做得很好";
    }
    updateStats();
    return;
  }

  showAnswer = false;
  document.getElementById("word").innerText = getPromptText(words[index]);
  updateStats();
}

function flip() {
  if (index >= words.length) return;

  if (showAnswer) {
    document.getElementById("word").innerText = getPromptText(words[index]);
  } else {
    document.getElementById("word").innerText = getAnswerText(words[index]);
    speakAnswer();
  }
  showAnswer = !showAnswer;
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.8;

  const voices = speechSynthesis.getVoices();
  const preferred =
    voices.find(v => v.lang === "en-US" && /Samantha|Karen|Moira|Ava|Jenny|Female/i.test(v.name)) ||
    voices.find(v => v.lang === "en-US") ||
    voices[0];

  if (preferred) u.voice = preferred;

  speechSynthesis.speak(u);
}

function speakCurrent() {
  if (index >= words.length) return;
  speak(words[index].en);
}

function speakAnswer() {
  if (index >= words.length) return;
  speak(words[index].en);
}

function saveWrongToday(word) {
  const key = wrongStorageKey(todayString());
  const arr = JSON.parse(localStorage.getItem(key) || "[]");
  arr.push({ zh: word.zh, en: word.en });
  localStorage.setItem(key, JSON.stringify(arr));
}

function mark(ok) {
  if (index >= words.length) return;

  const item = words[index];

  if (ok) {
    correctCount++;
    document.getElementById("message").innerText = "✅ 答對";
  } else {
    saveWrongToday(item);
    todayWrongWords.push({ zh: item.zh, en: item.en });
    document.getElementById("message").innerText = "❌ 這題先記下來";
  }

  totalCount++;
  index++;
  setTimeout(next, 250);
}

function updateStats() {
  const done = Math.min(index, words.length);
  document.getElementById("stats").innerText =
    `⭐ ${correctCount} / ${totalCount}　｜　進度 ${done} / ${words.length}`;
}

start();
</script>

</html>
